<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain Effect</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: transparent;
    }

    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    // ==========================================================================
    // Rain Effect Addon - Canvas 2D Rain Simulation
    // ==========================================================================

    (function() {
      'use strict';

      const api = window.MyWallpaper;
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d', { alpha: true });

      // State
      let drops = [];
      let splashes = [];
      let animationId = null;
      let isPaused = false;
      let lastTime = 0;
      let settings = {};

      // Cached values for performance
      let cachedRgb = { r: 168, g: 200, b: 232 };
      let canvasW = 0;
      let canvasH = 0;

      // Limit DPR for performance
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      // ==========================================================================
      // UTILITY FUNCTIONS
      // ==========================================================================

      function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? {
          r: parseInt(result[1], 16),
          g: parseInt(result[2], 16),
          b: parseInt(result[3], 16)
        } : { r: 168, g: 200, b: 232 };
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      // ==========================================================================
      // RAINDROP CLASS
      // ==========================================================================

      class Raindrop {
        constructor(layer) {
          this.layer = layer;
          this.x = 0;
          this.y = 0;
          this.length = 0;
          this.width = 0;
          this.speed = 0;
          this.windX = 0;
          this.opacity = 0;
          this.glowSize = 0;
          this.reset();
        }

        reset() {
          const layerFactor = 1 - (this.layer / settings.depthLayers) * 0.6;

          // Size based on layer (closer = larger)
          this.length = settings.dropLength * layerFactor * random(0.7, 1.3);
          this.width = settings.dropWidth * layerFactor * random(0.8, 1.2);

          // Speed based on layer (closer = faster)
          this.speed = settings.rainSpeed * layerFactor * random(0.8, 1.2) * 15;

          // Wind effect
          const windRad = (settings.windAngle + random(-settings.windVariation, settings.windVariation)) * Math.PI / 180;
          this.windX = Math.tan(windRad) * this.speed;

          // Spawn position: uniform distribution along the entry perimeter
          const totalLength = canvasW + canvasH;
          const spawnPoint = random(0, totalLength);

          if (spawnPoint < canvasW) {
            // Spawn from top edge
            this.x = spawnPoint;
            this.y = random(-100, -20);
          } else {
            // Spawn from side edge
            this.y = spawnPoint - canvasW;
            if (settings.windAngle >= 0) {
              this.x = random(-50, -10);
            } else {
              this.x = canvasW + random(10, 50);
            }
          }

          // Opacity based on layer
          this.opacity = layerFactor * random(0.4, 0.9);

          // Glow size
          this.glowSize = settings.enableGlow ? this.width * 3 * settings.glowIntensity : 0;
        }

        update(dt) {
          this.y += this.speed * dt;
          this.x += this.windX * dt;

          // Check if drop hit the ground
          if (this.y > canvasH) {
            if (settings.enableSplash && this.layer < 2) {
              createSplash(this.x, canvasH, this.layer);
            }
            this.reset();
            return;
          }

          // Reset if out of horizontal bounds
          if (this.x < -100 || this.x > canvasW + 100) {
            this.reset();
          }
        }

        draw() {
          const { r, g, b } = cachedRgb;

          ctx.save();
          ctx.translate(this.x, this.y);

          // Calculate angle from wind
          const angle = Math.atan2(this.speed, this.windX);
          ctx.rotate(angle - Math.PI / 2);

          // Glow effect
          if (this.glowSize > 0) {
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.glowSize);
            gradient.addColorStop(0, `rgba(${r},${g},${b},${this.opacity * 0.3})`);
            gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.fillStyle = gradient;
            ctx.fillRect(-this.glowSize, -this.length / 2 - this.glowSize, this.glowSize * 2, this.length + this.glowSize * 2);
          }

          // Main raindrop
          const halfLen = this.length / 2;
          const halfW = this.width / 2;
          const dropGradient = ctx.createLinearGradient(0, -halfLen, 0, halfLen);
          dropGradient.addColorStop(0, `rgba(${r},${g},${b},${this.opacity * 0.3})`);
          dropGradient.addColorStop(0.3, `rgba(${r},${g},${b},${this.opacity})`);
          dropGradient.addColorStop(0.7, `rgba(${r},${g},${b},${this.opacity})`);
          dropGradient.addColorStop(1, `rgba(${Math.min(r + 40, 255)},${Math.min(g + 40, 255)},${Math.min(b + 40, 255)},${this.opacity * 0.8})`);

          ctx.fillStyle = dropGradient;
          ctx.beginPath();
          ctx.roundRect(-halfW, -halfLen, this.width, this.length, halfW);
          ctx.fill();

          // Highlight
          ctx.fillStyle = `rgba(255,255,255,${this.opacity * 0.3})`;
          ctx.beginPath();
          ctx.roundRect(-halfW / 2, -halfLen, halfW, this.length * 0.3, halfW / 2);
          ctx.fill();

          ctx.restore();
        }
      }

      // ==========================================================================
      // SPLASH CLASS
      // ==========================================================================

      class Splash {
        constructor(x, y, layer) {
          this.x = x;
          this.y = y;
          this.lifetime = 0;
          this.maxLifetime = 30;

          const layerFactor = 1 - (layer / settings.depthLayers) * 0.5;
          const particleCount = Math.floor(random(3, 7) * settings.splashIntensity);

          this.particles = new Array(particleCount);
          for (let i = 0; i < particleCount; i++) {
            const angle = random(-Math.PI, 0);
            const speed = random(1, 4) * layerFactor * settings.splashIntensity;
            this.particles[i] = {
              x: 0,
              y: 0,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              size: random(1, 3) * layerFactor,
              opacity: random(0.5, 1)
            };
          }
        }

        update() {
          this.lifetime++;
          const particles = this.particles;
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.15;
            p.opacity *= 0.92;
          }
          return this.lifetime < this.maxLifetime;
        }

        draw() {
          const { r, g, b } = cachedRgb;
          const progress = this.lifetime / this.maxLifetime;

          ctx.save();
          ctx.translate(this.x, this.y);

          // Ripple effect
          const rippleRadius = progress * 20 * settings.splashIntensity;
          const rippleOpacity = (1 - progress) * 0.3;
          ctx.strokeStyle = `rgba(${r},${g},${b},${rippleOpacity})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(0, 0, rippleRadius, rippleRadius * 0.3, 0, 0, Math.PI * 2);
          ctx.stroke();

          // Particles
          const particles = this.particles;
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];
            if (p.opacity < 0.05) continue;
            ctx.fillStyle = `rgba(${r},${g},${b},${p.opacity})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }
      }

      function createSplash(x, y, layer) {
        if (splashes.length < 100) {
          splashes.push(new Splash(x, y, layer));
        }
      }

      // ==========================================================================
      // INITIALIZATION
      // ==========================================================================

      function initDrops() {
        drops = [];
        const totalDrops = settings.rainIntensity;
        const dropsPerLayer = Math.floor(totalDrops / settings.depthLayers);

        for (let layer = 0; layer < settings.depthLayers; layer++) {
          const layerDrops = Math.floor(dropsPerLayer * (1 + layer * 0.3));
          for (let i = 0; i < layerDrops; i++) {
            const drop = new Raindrop(layer);
            drop.y = random(0, canvasH);
            drops.push(drop);
          }
        }

        // Sort by layer (back to front)
        drops.sort((a, b) => b.layer - a.layer);
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        // Cache dimensions
        canvasW = rect.width;
        canvasH = rect.height;

        // Reinitialize drops for new size
        if (settings.rainIntensity) {
          initDrops();
        }
      }

      // ==========================================================================
      // RENDERING
      // ==========================================================================

      function animate(currentTime) {
        if (isPaused) return;

        const deltaTime = Math.min(currentTime - lastTime, 50);
        lastTime = currentTime;
        const dt = deltaTime * 0.06;

        // Clear canvas
        ctx.clearRect(0, 0, canvasW, canvasH);

        // Update and draw drops
        for (let i = 0; i < drops.length; i++) {
          drops[i].update(dt);
          drops[i].draw();
        }

        // Update and draw splashes
        let splashCount = splashes.length;
        for (let i = splashCount - 1; i >= 0; i--) {
          if (splashes[i].update()) {
            splashes[i].draw();
          } else {
            splashes.splice(i, 1);
          }
        }

        animationId = requestAnimationFrame(animate);
      }

      function start() {
        if (animationId) {
          cancelAnimationFrame(animationId);
        }
        isPaused = false;
        lastTime = performance.now();
        animationId = requestAnimationFrame(animate);
      }

      function stop() {
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
      }

      // ==========================================================================
      // SETTINGS APPLICATION
      // ==========================================================================

      function applySettings(newSettings, changedKeys = []) {
        const needsReinit = changedKeys.some(key =>
          ['rainIntensity', 'depthLayers'].includes(key)
        );

        settings = { ...newSettings };

        // Cache RGB color
        cachedRgb = hexToRgb(settings.rainColor);

        // Reinitialize drops if needed
        if (needsReinit || drops.length === 0) {
          initDrops();
        }

        // Update existing drops glow
        if (changedKeys.includes('enableGlow') || changedKeys.includes('glowIntensity')) {
          for (let i = 0; i < drops.length; i++) {
            drops[i].glowSize = settings.enableGlow ? drops[i].width * 3 * settings.glowIntensity : 0;
          }
        }
      }

      // ==========================================================================
      // EVENT HANDLERS
      // ==========================================================================

      api.onSettingsChange((newSettings, changedKeys) => {
        applySettings(newSettings, changedKeys);
      });

      api.onButtonClick('resetButton', () => {
        console.log('[RainEffect] Reset requested');
      });

      api.onEvent('viewport:resize', ({ width, height }) => {
        resize();
      });

      api.onMount(() => {
        console.log('[RainEffect] Mounted');
      });

      api.onUnmount(() => {
        console.log('[RainEffect] Unmounting');
        stop();
        drops = [];
        splashes = [];
      });

      api.onPause(() => {
        isPaused = true;
        stop();
      });

      api.onResume(() => {
        isPaused = false;
        start();
      });

      window.addEventListener('resize', resize);

      // ==========================================================================
      // INITIALIZATION
      // ==========================================================================

      function init() {
        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) {
          requestAnimationFrame(init);
          return;
        }

        resize();
        applySettings(api.config);
        start();

        api.ready({
          capabilities: ['hot-reload'],
          subscribedEvents: ['viewport:resize', 'theme:change']
        });

        api.renderComplete();
        console.log('[RainEffect] Ready');
      }

      if (document.readyState === 'complete') {
        init();
      } else {
        window.addEventListener('load', init);
      }

    })();
  </script>
</body>
</html>
