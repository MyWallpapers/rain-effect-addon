<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rain Effect</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <script>
    (function() {
      'use strict';

      const api = window.MyWallpaper;
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d', { alpha: true });

      // State
      let drops = [];
      let animationId = null;
      let isPaused = false;
      let lastTime = 0;
      let settings = {};

      // Cached values (updated on settings change only)
      let cachedColorStr = 'rgb(168,200,232)';
      let canvasW = 0;
      let canvasH = 0;

      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      // ---- Utilities ----

      function hexToRgb(hex) {
        const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r
          ? `rgb(${parseInt(r[1], 16)},${parseInt(r[2], 16)},${parseInt(r[3], 16)})`
          : 'rgb(168,200,232)';
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      // ---- Raindrop ----

      class Raindrop {
        constructor(layer) {
          this.layer = layer;
          this.x = 0;
          this.y = 0;
          this.length = 0;
          this.width = 0;
          this.speedX = 0;
          this.speedY = 0;
          this.dirX = 0;
          this.dirY = 0;
          this.opacity = 0;
          this.glowWidth = 0;
          this.reset();
        }

        reset() {
          const layerFactor = 1 - (this.layer / settings.depthLayers) * 0.6;

          this.length = settings.dropLength * layerFactor * random(0.7, 1.3);
          this.width = settings.dropWidth * layerFactor * random(0.8, 1.2);

          const baseSpeed = settings.rainSpeed * layerFactor * random(0.8, 1.2) * 15;
          const windRad = (settings.windAngle + random(-settings.windVariation, settings.windVariation)) * Math.PI / 180;

          this.speedX = Math.tan(windRad) * baseSpeed;
          this.speedY = baseSpeed;

          // Pre-compute normalized direction for line endpoints
          const mag = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
          this.dirX = this.speedX / mag;
          this.dirY = this.speedY / mag;

          // Spawn position: uniform along entry perimeter
          const spawnPoint = random(0, canvasW + canvasH);

          if (spawnPoint < canvasW) {
            this.x = spawnPoint;
            this.y = random(-100, -20);
          } else {
            this.y = spawnPoint - canvasW;
            this.x = settings.windAngle >= 0 ? random(-50, -10) : canvasW + random(10, 50);
          }

          this.opacity = layerFactor * random(0.4, 0.9);
          this.glowWidth = settings.enableGlow ? this.width * 3 : 0;
        }

        update(dt) {
          this.y += this.speedY * dt;
          this.x += this.speedX * dt;

          if (this.y > canvasH || this.x < -100 || this.x > canvasW + 100) {
            this.reset();
          }
        }
      }

      // ---- Init ----

      function initDrops() {
        drops = [];
        const dropsPerLayer = Math.floor(settings.rainIntensity / settings.depthLayers);

        for (let layer = 0; layer < settings.depthLayers; layer++) {
          const count = Math.floor(dropsPerLayer * (1 + layer * 0.3));
          for (let i = 0; i < count; i++) {
            const drop = new Raindrop(layer);
            drop.y = random(0, canvasH);
            drops.push(drop);
          }
        }

        // Sort back to front
        drops.sort((a, b) => b.layer - a.layer);
      }

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);

        canvasW = rect.width;
        canvasH = rect.height;

        if (settings.rainIntensity) initDrops();
      }

      // ---- Render ----

      function animate(currentTime) {
        if (isPaused) return;

        const deltaTime = Math.min(currentTime - lastTime, 50);
        lastTime = currentTime;
        const dt = deltaTime * 0.06;

        ctx.clearRect(0, 0, canvasW, canvasH);
        ctx.strokeStyle = cachedColorStr;
        ctx.lineCap = 'round';

        const glowEnabled = settings.enableGlow;
        const glowAlpha = settings.glowIntensity;

        for (let i = 0, len = drops.length; i < len; i++) {
          const drop = drops[i];
          drop.update(dt);

          const halfLen = drop.length * 0.5;
          const x1 = drop.x - drop.dirX * halfLen;
          const y1 = drop.y - drop.dirY * halfLen;
          const x2 = drop.x + drop.dirX * halfLen;
          const y2 = drop.y + drop.dirY * halfLen;

          // Glow: wider semi-transparent stroke
          if (glowEnabled) {
            ctx.globalAlpha = drop.opacity * glowAlpha;
            ctx.lineWidth = drop.glowWidth;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
          }

          // Main drop: simple line
          ctx.globalAlpha = drop.opacity;
          ctx.lineWidth = drop.width;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
        }

        ctx.globalAlpha = 1;
        animationId = requestAnimationFrame(animate);
      }

      function start() {
        if (animationId) cancelAnimationFrame(animationId);
        isPaused = false;
        lastTime = performance.now();
        animationId = requestAnimationFrame(animate);
      }

      function stop() {
        if (animationId) {
          cancelAnimationFrame(animationId);
          animationId = null;
        }
      }

      // ---- Settings ----

      function applySettings(newSettings, changedKeys = []) {
        const needsReinit = changedKeys.some(key =>
          ['rainIntensity', 'depthLayers'].includes(key)
        );

        settings = { ...newSettings };
        cachedColorStr = hexToRgb(settings.rainColor);

        if (needsReinit || drops.length === 0) {
          initDrops();
        }

        if (changedKeys.includes('enableGlow') || changedKeys.includes('glowIntensity')) {
          for (let i = 0; i < drops.length; i++) {
            drops[i].glowWidth = settings.enableGlow ? drops[i].width * 3 : 0;
          }
        }
      }

      // ---- Events ----

      api.onSettingsChange((newSettings, changedKeys) => {
        applySettings(newSettings, changedKeys);
      });

      api.onEvent('viewport:resize', () => resize());
      api.onMount(() => console.log('[RainEffect] Mounted'));
      api.onUnmount(() => { stop(); drops = []; });
      api.onPause(() => { isPaused = true; stop(); });
      api.onResume(() => { isPaused = false; start(); });

      window.addEventListener('resize', resize);

      // ---- Boot ----

      function init() {
        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) {
          requestAnimationFrame(init);
          return;
        }

        resize();
        applySettings(api.config);
        start();

        api.ready({
          capabilities: ['hot-reload'],
          subscribedEvents: ['viewport:resize', 'theme:change']
        });

        api.renderComplete();
      }

      if (document.readyState === 'complete') {
        init();
      } else {
        window.addEventListener('load', init);
      }

    })();
  </script>
</body>
</html>
